{% extends "base.html" %}
{% block title %}Novo Fornecedor{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-header"><strong><i class="bi bi-person-plus me-2"></i>Novo Fornecedor</strong></div>
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          {% for field in form %}
          <div class="mb-3">
            <label class="form-label fw-semibold">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
              <div class="text-danger small">{{ field.errors }}</div>
            {% endif %}
          </div>
          {% endfor %}
          <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-check-circle me-1"></i>Salvar Fornecedor
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
